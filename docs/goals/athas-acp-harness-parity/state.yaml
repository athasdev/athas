# GoalBuddy v2 state.yaml
# Board truth lives here. goal.md is the editable charter; notes/ holds long receipts only.

version: 2

goal:
  title: "Athas ACP Harness Parity"
  slug: "athas-acp-harness-parity"
  kind: specific
  tranche: "Zed-referenced ACP harness parity: map Zed harnesses, extend Athas harness coverage, verify, audit, and continue through safe slices until the first harness tranche is complete."
  status: done
  intake:
    original_request: "Match the amount of ACP harness that Zed has for Athas; look at how Zed does it and do the same for Athas while building on Athas's good foundation."
    interpreted_outcome: "Athas gains Zed-referenced ACP harness coverage for core behavior and provider/adaptor compatibility, with local tests proving the first tranche."
    input_shape: specific
    audience: "Athas maintainers and contributors"
    authority: approved
    proof_type: test
    completion_proof: "A Zed harness matrix exists, selected Athas harness slices are implemented, relevant local tests/checks pass, and final audit confirms the first harness parity tranche is complete."
    likely_misfire: "Creating many tests or copying Zed structure mechanically without reliable Athas ACP harness value."
    blind_spots_considered:
      - "Harness parity may mean behavior coverage, fake-agent infrastructure, provider/adaptor compatibility, smoke tooling, or raw test count."
      - "Real provider smoke can be flaky if it depends on auth, secrets, network, or local CLI state."
      - "Athas foundation is already good; the task is extension, not replacement."
      - "Provider compatibility belongs in scope, but broad provider expansion does not."
    existing_plan_facts:
      - "Use /Users/sw/Code/zed as the local reference source."
      - "Study how Zed does ACP harnesses/tests before choosing Athas work."
      - "Athas foundation is good; keep going from there."
      - "Optimize for behavioral ACP harness coverage plus provider compatibility harness."
      - "Include real adapter smoke where practical, but avoid auth-heavy or network-flaky runs."

rules:
  pm_owns_state: true
  one_active_task: true
  max_write_workers: 1
  no_implementation_without_worker_or_pm_task: true
  no_completion_without_judge_or_pm_audit: true
  planning_is_not_completion: true
  queued_required_worker_blocks_completion: true
  continuous_until_full_outcome: true
  missing_input_or_credentials_do_not_stop_goal: true
  preserve_and_validate_existing_plan: true
  intake_misfire_must_be_audited: true

agents:
  scout: installed
  worker: installed
  judge: installed

active_task: null

tasks:
