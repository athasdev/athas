    status: done
    reasoning_hint: medium
    objective: "Map Zed's ACP harness/test posture and identify the closest Athas harness extension points."
    inputs:
      - "/Users/sw/Code/zed"
      - "/Users/sw/Code/athas"
      - "Prior Athas ACP parity board: docs/goals/athas-acp-zed-parity/state.yaml"
      - "Prior Athas ACP parity note: docs/goals/athas-acp-zed-parity/notes/T001-acp-zed-map.md"
    constraints:
      - "Read-only."
      - "Do not edit implementation files."
      - "Treat /Users/sw/Code/zed as the reference for ACP harness/test posture."
      - "Use concrete file paths, test names, fixtures, fake providers/adapters, and commands."
      - "Separate behavior harness gaps from provider/adaptor compatibility harness gaps."
      - "Preserve Athas's existing foundation; recommend extension points, not rewrites."
    expected_output:
      - "Zed ACP harness/test map with file-path and test-name evidence."
      - "Athas current ACP harness/test map with file-path and test-name evidence."
      - "Harness parity matrix covering sessions, cancellation, streaming, tools, permissions, errors, usage, and provider/adaptor compatibility."
