name: "Release Preflight"

on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  readiness:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Validate release configuration
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          set -euo pipefail

          test -n "$TAURI_SIGNING_PRIVATE_KEY"
          test -n "$TAURI_SIGNING_PRIVATE_KEY_PASSWORD"
          test -f .github/workflows/release.yml
          test -f src-tauri/tauri.preview.conf.json
          test -f scripts/release/generate-notes.mjs
          test -f scripts/release/release-assets.mjs

          bun -e '
            const config = JSON.parse(await Bun.file("src-tauri/tauri.conf.json").text());
            const targets = config.bundle?.targets ?? [];
            const expected = ["app", "appimage", "deb", "dmg", "nsis", "rpm"];
            if (JSON.stringify(targets) !== JSON.stringify(expected)) {
              throw new Error(`Unexpected bundle targets: ${JSON.stringify(targets)}`);
            }
          '

          version="$(bun -e 'console.log(JSON.parse(await Bun.file("package.json").text()).version)')"
          tag="v${version}"

          bun scripts/release/generate-notes.mjs --tag "$tag" > release-body.md
          test -s release-body.md

          bun scripts/release/release-assets.mjs

      - name: Validate Rust targets and Zig
        run: |
          set -euo pipefail
          rustup target add aarch64-apple-darwin x86_64-apple-darwin aarch64-pc-windows-msvc
          bun scripts/check-zig.ts

  macos-readiness:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - name: Validate Apple signing and notarization credentials
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERT_PASSWORD: ${{ secrets.APPLE_CERT_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail

          missing=()
          [[ -n "$APPLE_CERTIFICATE" ]] || missing+=("APPLE_CERTIFICATE")
          [[ -n "$APPLE_CERT_PASSWORD" ]] || missing+=("APPLE_CERT_PASSWORD")
          [[ -n "$APPLE_ID" ]] || missing+=("APPLE_ID")
          [[ -n "$APPLE_PASSWORD" ]] || missing+=("APPLE_PASSWORD")
          [[ -n "$APPLE_TEAM_ID" ]] || missing+=("APPLE_TEAM_ID")

          if [[ "${#missing[@]}" -gt 0 ]]; then
            echo "Apple signing/notarization secrets are not fully configured; skipping macOS credential validation."
            printf 'Missing: %s\n' "${missing[*]}"
            exit 0
          fi

          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

          echo -n "$APPLE_CERTIFICATE" | base64 --decode -o $CERTIFICATE_PATH

          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security import $CERTIFICATE_PATH -P "$APPLE_CERT_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH
          security find-identity -v -p codesigning

          xcrun notarytool history \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --output-format json \
            >/dev/null

  windows-readiness:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - name: Validate Windows signing credentials
        shell: pwsh
        env:
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:WINDOWS_CERTIFICATE) -or
              [string]::IsNullOrWhiteSpace($env:WINDOWS_CERTIFICATE_PASSWORD)) {
            Write-Host "Windows Authenticode signing secrets are not configured; Windows installers will be built unsigned."
            exit 0
          }

          New-Item -ItemType Directory -Force -Path certificate | Out-Null
          Set-Content -Path certificate/tempCert.txt -Value $env:WINDOWS_CERTIFICATE
          certutil -decode certificate/tempCert.txt certificate/certificate.pfx
          if ($LASTEXITCODE -ne 0) {
            throw "Failed to decode Windows certificate from base64."
          }

          $securePassword = ConvertTo-SecureString -String $env:WINDOWS_CERTIFICATE_PASSWORD -AsPlainText -Force
          $importedCertificates = Import-PfxCertificate `
            -FilePath certificate/certificate.pfx `
            -CertStoreLocation Cert:\CurrentUser\My `
            -Password $securePassword

          $signingCertificate = $importedCertificates |
            Where-Object { $_.HasPrivateKey } |
            Select-Object -First 1

          if (-not $signingCertificate) {
            throw "Failed to import a Windows signing certificate with a private key."
          }
