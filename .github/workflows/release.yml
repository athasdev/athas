name: "Release"

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "macos-latest"
            os: "macos"
            args: "--target aarch64-apple-darwin"
            target: "aarch64-apple-darwin"
            include_updater_json: true
          - platform: "macos-latest"
            os: "macos"
            args: "--target x86_64-apple-darwin"
            target: "x86_64-apple-darwin"
            include_updater_json: true
          - platform: "ubuntu-22.04"
            os: "linux"
            args: "--bundles deb,rpm,appimage,updater"
            target: ""
            include_updater_json: true
          - platform: "ubuntu-22.04-arm"
            os: "linux"
            args: "--bundles deb,rpm"
            target: ""
            include_updater_json: false
          - platform: "windows-latest"
            os: "windows"
            args: ""
            target: ""
            include_updater_json: true
          - platform: "windows-latest"
            os: "windows"
            args: "--target aarch64-pc-windows-msvc"
            target: "aarch64-pc-windows-msvc"
            include_updater_json: true

    runs-on: ${{ matrix.platform }}
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4

      - name: Compute release metadata
        id: release_meta
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if [[ "$VERSION" == *-* ]]; then
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
            echo "release_name=Athas v__VERSION__ prerelease" >> "$GITHUB_OUTPUT"
            {
              echo "release_body<<EOF"
              echo "## Preview build"
              echo
              echo "This is a prerelease build for testing before the next stable release."
              echo
              echo "See the assets below to download this version and install."
              echo
              echo "Full changelog: https://github.com/athasdev/athas/compare/v__PREVIOUS_VERSION__...v__VERSION__"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          else
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
            echo "release_name=Athas v__VERSION__" >> "$GITHUB_OUTPUT"
            {
              echo "release_body<<EOF"
              echo "## What's Changed"
              echo
              echo "See the assets below to download this version and install."
              echo
              echo "### Installation"
              echo "- **macOS**: Download the \`.dmg\` file"
              echo "- **Windows**: Download the \`.exe\` file"
              echo "- **Linux**: Download the \`.deb\`, \`.rpm\`, or \`.AppImage\` file"
              echo
              echo "Full changelog: https://github.com/athasdev/athas/compare/v__PREVIOUS_VERSION__...v__VERSION__"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Free disk space (Linux only)
        if: matrix.os == 'linux'
        run: |
          echo "Disk usage before cleanup:"
          df -h
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android /opt/hostedtoolcache/CodeQL || true
          sudo docker system prune -af || true
          sudo apt-get clean
          echo "Disk usage after cleanup:"
          df -h

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Ensure Rust target is installed
        if: matrix.target != ''
        run: rustup target add ${{ matrix.target }}

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies (Linux only)
        if: matrix.os == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.0-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libfuse2 xdg-utils desktop-file-utils libglib2.0-bin squashfs-tools zsync file

      - name: Configure AppImage runtime (Linux only)
        if: matrix.os == 'linux'
        run: echo "APPIMAGE_EXTRACT_AND_RUN=1" >> "$GITHUB_ENV"

      - name: Verify Linux packaging tools (Linux only)
        if: matrix.os == 'linux'
        run: |
          command -v xdg-mime
          command -v desktop-file-validate
          command -v mksquashfs
          command -v zsyncmake

      - name: Install frontend dependencies
        run: bun install --ignore-scripts && bun scripts/postinstall.ts

      - name: Import Apple Certificate (macOS only)
        if: matrix.os == 'macos'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERT_PASSWORD: ${{ secrets.APPLE_CERT_PASSWORD }}
        run: |
          # Create variables
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

          # Import certificate from secrets
          echo -n "$APPLE_CERTIFICATE" | base64 --decode -o $CERTIFICATE_PATH

          # Create temporary keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          # Import certificate to keychain
          security import $CERTIFICATE_PATH -P "$APPLE_CERT_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

          # Verify certificate is available
          security find-identity -v -p codesigning

      - name: Sign bundled macOS binaries (macOS only)
        if: matrix.os == 'macos'
        env:
          APPLE_SIGNING_IDENTITY: "${{ secrets.APPLE_SIGNING_IDENTITY || 'Developer ID Application: Mehmet Ozgul (N43BXFX4H4)' }}"
        shell: bash
        run: |
          set -euo pipefail

          if [[ ! -d src/extensions/bundled ]]; then
            exit 0
          fi

          while IFS= read -r -d '' file_path; do
            file_type="$(file -b "$file_path" || true)"
            if [[ "$file_type" == *"Mach-O"* ]]; then
              echo "Signing bundled binary: $file_path"
              codesign --force --options runtime --sign "$APPLE_SIGNING_IDENTITY" "$file_path"
            fi
          done < <(find src/extensions/bundled -type f -perm -111 -print0)

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_ID: ${{ matrix.os == 'macos' && secrets.APPLE_ID || '' }}
          APPLE_PASSWORD: ${{ matrix.os == 'macos' && secrets.APPLE_PASSWORD || '' }}
          APPLE_TEAM_ID: ${{ matrix.os == 'macos' && secrets.APPLE_TEAM_ID || '' }}
          NO_STRIP: ${{ matrix.os == 'linux' && 'true' || '' }}
        with:
          tagName: v__VERSION__
          releaseName: ${{ steps.release_meta.outputs.release_name }}
          releaseBody: ${{ steps.release_meta.outputs.release_body }}
          releaseDraft: true
          prerelease: ${{ steps.release_meta.outputs.is_prerelease }}
          includeUpdaterJson: ${{ matrix.include_updater_json }}
          args: ${{ matrix.args }}

  publish-release:
    needs: publish-tauri
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: ${{ success() && startsWith(github.ref, 'refs/tags/v') }}
    steps:
      - name: Publish draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release edit "${GITHUB_REF_NAME}" --draft=false

  deploy-docs:
    if: ${{ !contains(github.ref_name, '-') }}
    runs-on: ubuntu-latest
    needs: publish-release
    steps:
      - name: Trigger docs rebuild on www
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.WWW_DEPLOY_TOKEN || secrets.WWW_REPO_TOKEN }}
          repository: athasdev/www
          event-type: docs-updated
