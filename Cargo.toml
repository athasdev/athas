[workspace]
members = [
  "src-tauri",
  "crates/runtime",
  "crates/tooling",
  "crates/lsp",
  "crates/remote",
  "crates/project",
  "crates/database",
  "crates/version-control",
  "crates/extensions",
  "crates/terminal",
  "crates/ai",
  "crates/github",
  "crates/fff-search",
]
resolver = "2"

[patch.crates-io]
agent-client-protocol = { path = "vendor/agent-client-protocol" }
agent-client-protocol-schema = { path = "vendor/agent-client-protocol-schema" }

[workspace.lints.clippy]
uninlined_format_args = "allow"
new-without-default = "allow"

[profile.release]
lto = "thin"
codegen-units = 1
