[workspace]
members = [
  "src-tauri",
  "crates/runtime",
  "crates/tooling",
  "crates/lsp",
  "crates/remote",
  "crates/project",
  "crates/database",
  "crates/version-control",
  "crates/extensions",
  "crates/terminal",
  "crates/ai",
  "crates/github",
]
resolver = "2"

[workspace.lints.clippy]
uninlined_format_args = "allow"
new-without-default = "allow"

[profile.release]
lto = "thin"
codegen-units = 1
